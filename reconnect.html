<!doctype html>
<html lang="pt-BR"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Reconectar banco · Companheiro</title>
<style>
 body{font-family:-apple-system,system-ui,sans-serif;background:#101012;color:#ebebee;margin:0;
   min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
   text-align:center;padding:32px 20px}
 h2{margin:0 0 8px;font-size:20px} p{color:#9a9aa2;max-width:420px;line-height:1.5;margin:6px 0}
 #open{margin-top:20px;padding:15px 26px;font-size:16px;border:none;border-radius:13px;
   background:#e8734f;color:#1a0f0a;font-weight:800;cursor:pointer}
 #open:active{opacity:.85} #open:disabled{opacity:.5}
 #msg{margin-top:18px;font-size:14px;min-height:20px}
 .ok{color:#93b184;font-weight:700} .err{color:#e08a6f}
 .bank{color:#e8b04f;font-weight:700}
</style></head><body>
 <h2>Reconectar banco</h2>
 <p id="sub">Isso força a Pluggy a puxar os dados novos do banco agora (sem esperar o ciclo de 24h).</p>
 <p>O login é você que faz, direto no banco — a senha <b>não passa por aqui</b>.</p>
 <button id="open">Abrir reconexão</button>
 <div id="msg"></div>
 <script src="https://cdn.pluggy.ai/pluggy-connect/v2.8.2/pluggy-connect.js"></script>
 <script>
  var q = new URLSearchParams(location.search);
  var TOKEN = q.get('token') || '', ITEM = q.get('item') || '', NAME = q.get('name') || 'o banco';
  var msg = document.getElementById('msg'), btn = document.getElementById('open');
  document.getElementById('sub').innerHTML = 'Reconectar <span class="bank">' + NAME + '</span> — força a Pluggy a puxar os dados novos agora (sem esperar o ciclo de 24h).';
  if (!TOKEN || !ITEM) { btn.disabled = true; msg.className = 'err'; msg.textContent = 'Link inválido (sem token). Volte ao app e tente de novo.'; }
  btn.onclick = function(){
    btn.disabled = true; msg.textContent = 'abrindo…';
    try {
      var pc = new PluggyConnect({
        connectToken: TOKEN, updateItem: ITEM, connectorIds: [200], includeSandbox: false,
        onSuccess: function(){ msg.className = 'ok'; msg.innerHTML = '✅ Reconectado! Volte pro app e toque <b>“puxar agora”</b>.'; btn.style.display='none'; },
        onError: function(e){ btn.disabled = false; msg.className = 'err'; msg.textContent = 'Erro: ' + ((e && e.message) || 'tente de novo'); }
      });
      pc.init();
    } catch(e){ btn.disabled = false; msg.className = 'err'; msg.textContent = 'Falha ao abrir: ' + e.message; }
  };
 </script>
</body></html>
